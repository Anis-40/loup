name: loup_garou
description: "لعبة المستذئبين - Loup-Garou"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  intl: any
  easy_localization: ^3.0.5
  web_socket_channel: ^2.4.1
  shelf: ^1.4.1
  shelf_web_socket: ^1.0.4
  udp: 5.0.3
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  http: ^1.2.0
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/translations/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/wolf_icon.png"
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/images/wolf_icon.png"

