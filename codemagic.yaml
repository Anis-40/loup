workflows:
  ios-unsigned:
    name: Build Unsigned iOS (For AltStore)
    instance_type: mac_mini_m2
    environment:
      flutter: default
      xcode: latest
    scripts:
      - name: Xcode Hack Build 🛠️
        script: |
          set -x
          flutter pub get
          # جعل Flutter يجهز الملفات فقط ونتجاهل خطأه المقصود
          flutter build ios --release --no-codesign || true
          cd ios
          # إجبار النظام على بناء التطبيق بالقوة بدون حساب مطور
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -derivedDataPath ../build/ios_derived CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          cd ../build
          mkdir -p Payload
          mv ios_derived/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -qr app.ipa Payload
    artifacts:
      - build/app.ipa