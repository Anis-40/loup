workflows:
  ios-unsigned:
    name: Build Unsigned iOS (For AltStore)
    instance_type: mac_mini_m2
    environment:
      flutter: 3.22.2
      xcode: latest
    scripts:
      - name: The Ultimate Xcode Hack 🛠️
        script: |
          set -ex
          flutter pub get
          flutter build ios --release --no-codesign || true
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -derivedDataPath ../build/ios_derived CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          cd ../build
          mkdir -p Payload
          cp -r ios_derived/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -qr app.ipa Payload
    artifacts:
      - build/app.ipa